<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Web-QT6000 Pro - V23 SMART LINE</title>
    <style>
        :root {
            --pos-blue: #1c2331; --screen-gray: #b0b8c0; --btn-num: #37474f;
            --btn-red: #c62828; --btn-blue: #1565c0; --btn-green: #2e7d32;
            --btn-yellow: #f9a825; --prod-brown: #5d4037; --btn-ale: #b71c1c;
        }
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: white; height: 100vh; overflow: hidden; }
        
        #system-lock { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #lock-input { background: #111; border: 3px solid #444; color: #0f0; font-size: 50px; text-align: center; padding: 20px; width: 350px; border-radius: 15px; outline: none; }

        #pos-container { display: none; width: 100vw; height: 100vh; grid-template-rows: 45px 1fr; padding: 5px; gap: 5px; box-sizing: border-box; }
        #status-bar { background: var(--pos-blue); display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; padding: 0 20px; font-size: 14px; border-bottom: 2px solid #000; }

        #main-layout { display: grid; grid-template-columns: 420px 1fr; gap: 10px; height: calc(100vh - 65px); }
        
        #left-col { display: flex; flex-direction: column; gap: 8px; border-right: 2px solid #333; padding-right: 5px; }
        #receipt-area { background: var(--screen-gray); flex-grow: 1; border: 4px solid #555; color: #000; font-family: 'Courier New', monospace; padding: 15px; overflow-y: auto; white-space: pre; font-size: 15px; font-weight: bold; }
        #buf-val { background: #000; color: #0f0; font-size: 45px; font-weight: bold; text-align: right; padding: 10px; border: 2px solid #555; border-radius: 5px; min-height: 60px; }
        
        #keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; height: 420px; }

        #right-col { display: grid; grid-template-rows: auto 1fr; gap: 10px; overflow: hidden; }
        #group-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: #222; padding: 8px; border-radius: 8px; }
        #product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); grid-auto-rows: 95px; gap: 8px; overflow-y: auto; padding: 5px; background: #111; }

        .btn { border-radius: 6px; border: 1px solid #333; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; text-transform: uppercase; user-select: none; font-size: 11px; box-shadow: 0 3px 0 #000; }
        .btn:active { transform: translateY(2px); box-shadow: none; filter: brightness(1.5); }
        
        .c-num { background: var(--btn-num); font-size: 24px; }
        .c-red { background: var(--btn-red); }
        .c-green { background: var(--btn-green); }
        .c-yellow { background: var(--btn-yellow); color: #000; }
        .c-blue { background: var(--btn-blue); }
        .c-prod { background: var(--prod-brown); flex-direction: column; padding: 5px; }
        .c-ale-btn { background: var(--btn-ale); }
        .c-group { background: #37474f; min-height: 55px; }
        .active-group { background: #546e7a; border-bottom: 4px solid #0f0; }

        #pgm-overlay { display: none; position: absolute; z-index: 11000; inset: 20px; background: #1a1a1a; flex-direction: column; border: 3px solid var(--btn-blue); }
        .tab-btn { padding: 15px 25px; cursor: pointer; color: #90a4ae; border: none; background: none; font-weight: bold; }
        .tab-btn.active { background: var(--btn-blue); color: #fff; }
        #term-sim { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="system-lock">
    <h1>QT-6000 V23 SMART RETAIL</h1>
    <input type="password" id="lock-input" placeholder="ACCESS CODE" autocomplete="off">
</div>

<div id="term-sim">
    <div style="background: #333; border: 5px solid #666; width: 320px; padding: 30px; border-radius: 20px; text-align: center;">
        <div style="background: #050; height: 80px; display: flex; align-items: center; justify-content: center; color: #0f0; font-size: 24px; font-family: monospace; border-radius: 10px;" id="term-sum">0.00 €</div>
        <p style="color: #fff; margin-top: 15px;">LUE KORTTI...</p>
    </div>
</div>

<div id="pos-container">
    <div id="status-bar">
        <span id="st-clerk">EI KIRJ.</span>
        <span style="text-align:center">QT-6000 ROW STACKING ACTIVE</span>
        <span id="st-time">00:00:00</span>
    </div>

    <div id="main-layout">
        <div id="left-col">
            <div id="receipt-area">VALMIS</div>
            <div id="buf-val">0.00</div>
            <div id="keypad">
                <div class="btn c-red" onclick="resetPOS()">ESC</div>
                <div class="btn c-num" onclick="clearBuffer()">C</div>
                <div class="btn c-blue" onclick="togglePGM()">PGM</div>
                <div class="btn c-red" onclick="voidLast()">POISTA</div>
                <div class="btn c-num" onclick="num('7')">7</div>
                <div class="btn c-num" onclick="num('8')">8</div>
                <div class="btn c-num" onclick="num('9')">9</div>
                <div class="btn c-yellow" onclick="multiplier()">X</div>
                <div class="btn c-num" onclick="num('4')">4</div>
                <div class="btn c-num" onclick="num('5')">5</div>
                <div class="btn c-num" onclick="num('6')">6</div>
                <div class="btn c-yellow" onclick="clerkLogin()">MYYJÄ</div>
                <div class="btn c-num" onclick="num('1')">1</div>
                <div class="btn c-num" onclick="num('2')">2</div>
                <div class="btn c-num" onclick="num('3')">3</div>
                <div class="btn c-blue" onclick="processCard()">KORTTI</div>
                <div class="btn c-num" onclick="num('0')">0</div>
                <div class="btn c-num" onclick="num('00')">00</div>
                <div class="btn c-green" onclick="showSubtotal()">VÄLIS.</div>
                <div class="btn c-green" style="background:#1b5e20; border:2px solid #fff;" onclick="payCash()">KÄTEINEN</div>
                <div class="btn c-red" id="btn-ret" onclick="toggleReturn()">PALAUTUS</div>
                <div class="btn c-purple" style="background:#4a148c" onclick="sellGiftCard()">M-LAHJA</div>
                <div class="btn c-purple" style="background:#4a148c" onclick="payGiftCard()">L-MAKSU</div>
                <div class="btn c-red" style="background:#222" onclick="cart=[];updateReceipt();">TYHJÄÄ</div>
            </div>
        </div>
        <div id="right-col">
            <div id="group-grid"></div>
            <div id="product-grid"></div>
        </div>
    </div>
</div>

<div id="pgm-overlay">
    <div class="pgm-tabs">
        <div class="tab-btn active" onclick="showTab('p')">TUOTTEET</div>
        <div class="tab-btn" onclick="showTab('m')">MYYJÄT</div>
        <div class="tab-btn" style="margin-left:auto; background:red" onclick="togglePGM()">SULJE</div>
    </div>
    <div id="pgm-p" style="padding:20px; overflow-y:auto; height:85%;"><table id="t-p" style="width:100%; text-align:left;"></table></div>
    <div id="pgm-m" style="padding:20px; display:none;">
        <input type="text" id="m-id" placeholder="ID"> <input type="text" id="m-name" placeholder="Nimi">
        <button onclick="addClerk()">LISÄÄ</button>
        <table id="t-m" style="width:100%; margin-top:10px;"></table>
    </div>
</div>

<script>
    let db = {
        prods: [],
        groups: [{id:1,name:"OLUET"},{id:2,name:"SIIDERIT"},{id:3,name:"VIINAT"},{id:4,name:"SHOTIT"},{id:5,name:"MIXERIT"},{id:6,name:"VIINIT"},{id:7,name:"RUOKA"},{id:8,name:"- ALE -"}],
        clerks: [{id:"1", name:"ADMIN"},{id:"123", name:"KASSA 1"}], giftcards: {}, sysPass: "94610758"
    };

    let cart = []; let buffer = ""; let xQty = 1; let currentClerk = null; let activeG = 1; let isReturn = false;

    const setup = () => {
        ["KARHU","SANDELS","AURA","IPA","LAGER","PILS"].forEach(n => db.prods.push({name:n, price:800, gid:1}));
        ["LONKERO","LONKERO RED","HAPPY JOE","CROWMOOR"].forEach(n => db.prods.push({name:n, price:820, gid:2}));
        ["VODKA 4CL","GIN 4CL","ROMMI","BRANDY","HENNESSY"].forEach(n => db.prods.push({name:n, price:750, gid:3}));
        ["FISU","SALMARI","MINTTU","JÄGER","HOT SHOT","TEQUILA","FIREBALL"].forEach(n => db.prods.push({name:n, price:700, gid:4}));
        ["+ COLA","+ SPRITE","+ TONIC","+ RED BULL","+ SODA"].forEach(n => db.prods.push({name:n, price:250, gid:5}));
        ["VALKOVIINI","PUNAVIINI","PROSECCO"].forEach(n => db.prods.push({name:n, price:950, gid:6}));
        ["BURGER","RANSKALAISET","TOAST"].forEach(n => db.prods.push({name:n, price:1200, gid:7}));
        db.prods.push(
            {name:"STAFF -50%", price:-0.50, gid:8, mode:"perc"},
            {name:"VIP -20%", price:-0.20, gid:8, mode:"perc"},
            {name:"ALE -1.00€", price:-100, gid:8, mode:"fix"},
            {name:"HUKKA", price:0, gid:8, mode:"fix"}
        );
    };

    document.getElementById('lock-input').onkeypress = (e) => {
        if(e.key==='Enter' && e.target.value===db.sysPass) {
            document.getElementById('system-lock').style.display='none';
            document.getElementById('pos-container').style.display='grid';
            setup(); renderUI();
        }
    };

    function num(v) { buffer += v; updateDisplay(); }
    function clearBuffer() { buffer = ""; xQty = 1; updateDisplay(); }
    function multiplier() { xQty = buffer==="" ? 1 : parseInt(buffer); buffer = ""; updateDisplay(); }
    function updateDisplay() { 
        let val = buffer==="" ? (xQty>1 ? xQty+" X" : "0.00") : (parseInt(buffer)/100).toFixed(2);
        document.getElementById('buf-val').innerText = val; 
    }

    function clerkLogin() {
        let c = db.clerks.find(x => x.id === buffer);
        if(c) { currentClerk = c; document.getElementById('st-clerk').innerText = c.name; clearBuffer(); }
        else { alert("VIRHE"); clearBuffer(); }
    }

    function addProd(p) {
        if(!currentClerk) return alert("KIRJAUDU SISÄÄN!");
        
        let price = 0;
        let pName = p.name;

        if(p.gid === 8) {
            let currentTotal = cart.reduce((a,b)=>a+(b.price*b.qty), 0);
            price = p.mode === "perc" ? currentTotal * p.price : p.price / 100;
            cart.push({name: pName, price: price, qty: 1}); // Alennuksia ei pinota määrällisesti
        } else {
            price = buffer !== "" ? parseInt(buffer)/100 : p.price/100;
            if(isReturn) price = -Math.abs(price);
            
            // SMART STACK LOGIIKKA:
            let lastItem = cart[cart.length - 1];
            if(lastItem && lastItem.name === pName && lastItem.price === price) {
                lastItem.qty += xQty;
            } else {
                cart.push({name: pName, price: price, qty: xQty});
            }
        }
        
        buffer = ""; xQty = 1; updateReceipt(); updateDisplay();
    }

    function updateReceipt() {
        let total = cart.reduce((a,b)=>a+(b.price*b.qty), 0);
        document.getElementById('receipt-area').innerText = cart.map(i => {
            let row = `${(i.qty>1?i.qty+'x ':'').padEnd(4)}${i.name.padEnd(20).substring(0,20)}`;
            let price = (i.price*i.qty).toFixed(2).padStart(8);
            return row + price;
        }).join('\n') || "VALMIS";
    }

    function showSubtotal() {
        let total = cart.reduce((a,b)=>a+(b.price*b.qty), 0);
        document.getElementById('buf-val').innerText = "YHT: " + total.toFixed(2);
    }

    function processCard() {
        if(cart.length===0) return;
        let total = cart.reduce((a,b)=>a+(b.price*b.qty), 0);
        document.getElementById('term-sum').innerText = total.toFixed(2) + " €";
        document.getElementById('term-sim').style.display='flex';
        setTimeout(() => { document.getElementById('term-sim').style.display='none'; finalize("KORTTI"); }, 1200);
    }

    function payCash() { if(cart.length>0) finalize("KÄTEINEN"); }

    function finalize(m) {
        let total = cart.reduce((a,b)=>a+(b.price*b.qty), 0);
        let txt = "     *** KUITTI ***\n\n" + cart.map(i => `${(i.qty>1?i.qty+'x ':'').padEnd(4)}${i.name.padEnd(18).substring(0,18)} ${(i.price*i.qty).toFixed(2).padStart(8)}`).join('\n');
        txt += `\n${"-".repeat(32)}\nYHTEENSÄ: ${total.toFixed(2).padStart(21)} EUR\n${m.padEnd(10)}: ${total.toFixed(2).padStart(20)} EUR`;
        document.getElementById('receipt-area').innerText = txt;
        cart = []; clearBuffer(); isReturn = false; document.getElementById('btn-ret').style.background = "";
    }

    function sellGiftCard() {
        let val = buffer==="" ? 50 : parseInt(buffer)/100;
        cart.push({name: "LAHJA", price: val, qty: 1});
        updateReceipt(); clearBuffer();
    }

    function payGiftCard() { if(prompt("KOODI:")) finalize("LAHJA"); }
    function toggleReturn() { isReturn = !isReturn; document.getElementById('btn-ret').style.background = isReturn ? "yellow" : ""; }
    function voidLast() { cart.pop(); updateReceipt(); }
    function resetPOS() { cart=[]; clearBuffer(); updateReceipt(); isReturn=false; document.getElementById('btn-ret').style.background=""; }

    function renderUI() {
        document.getElementById('group-grid').innerHTML = db.groups.map(g => `<div class="btn c-group ${g.id == activeG ? 'active-group' : ''}" onclick="activeG=${g.id};renderUI()">${g.name}</div>`).join('');
        document.getElementById('product-grid').innerHTML = db.prods.filter(p => p.gid == activeG).map(p => `<div class="btn c-prod ${p.gid==8?'c-ale-btn':''}" onclick='addProd(${JSON.stringify(p)})'><span>${p.name}</span><b style="margin-top:auto; font-size:16px;">${p.gid==8 ? '' : (p.price/100).toFixed(2)+'€'}</b></div>`).join('');
    }

    function togglePGM() {
        let o = document.getElementById('pgm-overlay');
        o.style.display = (o.style.display==='flex'?'none':'flex');
        renderPGM();
    }

    function showTab(t) {
        document.getElementById('pgm-p').style.display = t==='p'?'block':'none';
        document.getElementById('pgm-m').style.display = t==='m'?'block':'none';
    }

    function renderPGM() {
        document.getElementById('t-p').innerHTML = db.prods.map((p,i) => `<tr><td>${p.name}</td><td>${p.price}</td><td><button onclick="db.prods.splice(${i},1);renderPGM();renderUI()">X</button></td></tr>`).join('');
        document.getElementById('t-m').innerHTML = db.clerks.map(c => `<tr><td>${c.id}</td><td>${c.name}</td></tr>`).join('');
    }

    function addClerk() {
        let id = document.getElementById('m-id').value; let name = document.getElementById('m-name').value;
        if(id && name) { db.clerks.push({id:id, name:name.toUpperCase()}); renderPGM(); }
    }

    setInterval(() => document.getElementById('st-time').innerText = new Date().toLocaleTimeString('fi-FI'), 1000);
</script>
</body>
</html>
