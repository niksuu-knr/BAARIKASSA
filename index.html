<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Web-QT6600 POS</title>
    <style>
        :root {
            --bg-color: #2e2e2e;
            --sidebar-bg: #e0e0e0;
            --btn-drink: #4a90e2;
            --btn-spirit: #50e3c2;
            --btn-function: #d0021b;
            --btn-pay: #7ed321;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Vasen puoli: Kuitti */
        #receipt-panel {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 4px solid #999;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        #receipt-list {
            flex-grow: 1;
            background: white;
            border: 2px inset #ccc;
            padding: 10px;
            font-family: 'Courier New', monospace;
            overflow-y: auto;
        }

        .total-display {
            font-size: 2rem;
            font-weight: bold;
            text-align: right;
            background: #000;
            color: #0f0;
            padding: 10px;
            margin-top: 10px;
        }

        /* Oikea puoli: Näppäimistö */
        #pos-grid {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            padding: 5px;
        }

        .pos-button {
            border: 3px outset #eee;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: active 0.1s;
        }

        .pos-button:active {
            border-style: inset;
            transform: scale(0.98);
        }

        /* Värit */
        .beer { background-color: var(--btn-drink); }
        .spirit { background-color: var(--btn-spirit); }
        .func { background-color: #9b9b9b; }
        .pay { background-color: var(--btn-pay); }
        .cancel { background-color: var(--btn-function); }
    </style>
</head>
<body>

<div id="receipt-panel">
    <h3>KUITTI</h3>
    <div id="receipt-list">
        <!-- Tuotteet tulevat tänne -->
    </div>
    <div class="total-display" id="total-price">0.00 €</div>
</div>

<div id="pos-grid">
    <!-- Esimerkkinäppäimet -->
    <button class="pos-button beer" onclick="addItem('Karhu 0.5L', 8.50)">KARHU 0.5L</button>
    <button class="pos-button beer" onclick="addItem('Lonkero', 7.50)">LONKERO</button>
    <button class="pos-button spirit" onclick="addItem('GT', 12.00)">GIN TONIC</button>
    <button class="pos-button spirit" onclick="addItem('Shot', 6.00)">JALLU SHOT</button>
    <button class="pos-button beer" onclick="addItem('Siideri', 8.00)">SIIDERI</button>
    <button class="pos-button func" onclick="location.reload()">CLEAR</button>

    <!-- Tyhjiä ruutuja matkimaan Casio-asettelua -->
    <button class="pos-button beer" onclick="addItem('IPA', 9.50)">IPA 0.4L</button>
    <button class="pos-button beer" onclick="addItem('Viini 12cl', 9.00)">VIINI 12CL</button>
    <button class="pos-button spirit" onclick="addItem('Vodka Soda', 11.00)">VODKA SODA</button>
    <button class="pos-button func">PÖYTÄ</button>
    <button class="pos-button func">MUUTOS</button>
    <button class="pos-button cancel" onclick="clearLast()">KORJAA</button>

    <!-- Alarivi -->
    <div style="grid-column: span 4;"></div>
    <button class="pos-button pay" style="grid-column: span 2; grid-row: span 2;" onclick="checkout()">KÄTEINEN / MAKSU</button>
</div>

<script>
    let total = 0;
    const receiptList = document.getElementById('receipt-list');
    const totalDisplay = document.getElementById('total-price');

    function addItem(name, price) {
        total += price;
        const entry = document.createElement('div');
        entry.innerHTML = `<span>${name}</span> <span style="float:right">${price.toFixed(2)}</span>`;
        receiptList.appendChild(entry);
        updateTotal();
    }

    function updateTotal() {
        totalDisplay.innerText = `${total.toFixed(2)} €`;
    }

    function clearLast() {
        // Yksinkertaistettu tyhjennys
        receiptList.innerHTML = '';
        total = 0;
        updateTotal();
    }

    function checkout() {
        if(total === 0) return;
        alert("Maksu suoritettu: " + total.toFixed(2) + " €");
        clearLast();
    }
</script>

</body>
</html>
