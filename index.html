<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Web-QT6000 Pro - V20 SHOT EDITION</title>
    <style>
        :root {
            --pos-blue: #1c2331; --screen-gray: #b0b8c0; --btn-num: #37474f;
            --btn-red: #c62828; --btn-blue: #1565c0; --btn-green: #2e7d32;
            --btn-yellow: #f9a825; --prod-brown: #5d4037; --btn-promo: #00838f;
            --btn-purple: #6a1b9a;
        }
        body { margin: 0; background: #000; font-family: 'Segoe UI', Arial, sans-serif; color: white; height: 100vh; overflow: hidden; }
        
        #system-lock { position: fixed; inset: 0; background: radial-gradient(circle, #222 0%, #000 100%); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #lock-input { background: #111; border: 3px solid #444; color: #0f0; font-size: 50px; text-align: center; padding: 20px; width: 350px; border-radius: 15px; outline: none; }

        #pos-container { display: none; width: 100vw; height: 100vh; grid-template-rows: 45px 1fr; padding: 5px; gap: 5px; box-sizing: border-box; }
        #status-bar { background: var(--pos-blue); display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; padding: 0 20px; font-size: 15px; border-bottom: 2px solid #000; }

        #main-layout { display: grid; grid-template-columns: 420px 1fr; gap: 10px; height: calc(100vh - 65px); }
        
        #left-col { display: flex; flex-direction: column; gap: 8px; border-right: 2px solid #333; padding-right: 5px; }
        #receipt-area { background: var(--screen-gray); flex-grow: 1; border: 4px solid #555; color: #000; font-family: 'Courier New', monospace; padding: 15px; overflow-y: auto; white-space: pre; font-size: 15px; line-height: 1.2; box-shadow: inset 0 0 15px rgba(0,0,0,0.3); }
        #input-line { background: #000; height: 90px; border: 3px solid #555; display: flex; flex-direction: column; justify-content: center; padding: 0 20px; border-radius: 5px; }
        #buf-val { color: #0f0; font-size: 45px; font-weight: bold; text-align: right; text-shadow: 0 0 10px rgba(0,255,0,0.5); }
        #keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; height: 420px; }

        #right-col { display: grid; grid-template-rows: auto 1fr; gap: 10px; overflow: hidden; }
        #group-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: #222; padding: 8px; border-radius: 8px; }
        #product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); grid-auto-rows: 130px; gap: 10px; overflow-y: auto; padding: 5px; }

        .btn { border-radius: 6px; border: 1px solid #333; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; text-transform: uppercase; user-select: none; font-size: 13px; box-shadow: 0 3px 0 #000; }
        .btn:active { transform: translateY(2px); box-shadow: none; filter: brightness(1.6); }
        
        .c-num { background: var(--btn-num); font-size: 26px; }
        .c-red { background: var(--btn-red); }
        .c-green { background: var(--btn-green); }
        .c-yellow { background: var(--btn-yellow); color: #000; }
        .c-blue { background: var(--btn-blue); }
        .c-purple { background: var(--btn-purple); }
        .c-prod { background: var(--prod-brown); flex-direction: column; padding: 10px; }
        .c-group { background: #37474f; min-height: 55px; }
        .active-group { background: #546e7a; border-bottom: 4px solid #0f0; }

        /* PGM */
        #pgm-overlay { display: none; position: absolute; z-index: 11000; inset: 20px; background: #1a1a1a; flex-direction: column; border: 3px solid var(--btn-blue); border-radius: 10px; }
        .pgm-tabs { display: flex; background: #263238; border-radius: 7px 7px 0 0; }
        .tab-btn { padding: 18px 25px; cursor: pointer; color: #90a4ae; border: none; background: none; font-weight: bold; }
        .tab-btn.active { background: var(--btn-blue); color: #fff; }
        .pgm-content { flex-grow: 1; padding: 25px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #222; }
        th, td { border: 1px solid #444; padding: 10px; text-align: left; }

        #term-sim { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="system-lock">
    <h1 style="letter-spacing: 5px;">QT-6000 V20 PRO</h1>
    <input type="password" id="lock-input" placeholder="ACCESS CODE" autocomplete="off">
</div>

<div id="term-sim">
    <div style="background: #333; border: 5px solid #666; width: 320px; padding: 30px; border-radius: 20px; text-align: center;">
        <div style="background: #050; height: 80px; display: flex; align-items: center; justify-content: center; color: #0f0; font-size: 24px; font-family: monospace; border-radius: 10px;" id="term-sum">0.00 €</div>
        <p style="color: #fff; margin-top: 15px;">KÄSITTELLÄÄN...</p>
    </div>
</div>

<div id="pos-container">
    <div id="status-bar">
        <span id="st-clerk">EI KIRJ.</span>
        <span style="text-align:center">QT-6000 SHOT MASTER</span>
        <span id="st-time">00:00:00</span>
    </div>

    <div id="main-layout">
        <div id="left-col">
            <div id="receipt-area">VALMIS</div>
            <div id="input-line"><div id="buf-val">0.00</div></div>
            <div id="keypad">
                <div class="btn c-red" onclick="resetPOS()">ESC</div>
                <div class="btn c-num" onclick="clearBuffer()">C</div>
                <div class="btn c-blue" onclick="togglePGM()">PGM</div>
                <div class="btn c-red" onclick="voidLast()">POISTA</div>
                <div class="btn c-num" onclick="num('7')">7</div>
                <div class="btn c-num" onclick="num('8')">8</div>
                <div class="btn c-num" onclick="num('9')">9</div>
                <div class="btn c-yellow" onclick="multiplier()">X</div>
                <div class="btn c-num" onclick="num('4')">4</div>
                <div class="btn c-num" onclick="num('5')">5</div>
                <div class="btn c-num" onclick="num('6')">6</div>
                <div class="btn c-yellow" onclick="clerkLogin()">MYYJÄ</div>
                <div class="btn c-num" onclick="num('1')">1</div>
                <div class="btn c-num" onclick="num('2')">2</div>
                <div class="btn c-num" onclick="num('3')">3</div>
                <div class="btn c-blue" onclick="processCard()">KORTTI</div>
                <div class="btn c-num" onclick="num('0')">0</div>
                <div class="btn c-num" onclick="num('00')">00</div>
                <div class="btn c-green" onclick="showSubtotal()">VÄLIS.</div>
                <div class="btn c-green" style="background: #1b5e20; border: 2px solid #fff;" onclick="payCash()">KÄTEINEN</div>
                <div class="btn c-red" id="btn-ret" onclick="toggleReturn()">PALAUTUS</div>
                <div class="btn c-purple" onclick="sellGiftCard()">M-LAHJA</div>
                <div class="btn c-purple" onclick="payGiftCard()">L-MAKSU</div>
                <div class="btn c-red" style="background:#222" onclick="cart=[];updateReceipt();">TYHJÄÄ</div>
            </div>
        </div>

        <div id="right-col">
            <div id="group-grid"></div>
            <div id="product-grid"></div>
        </div>
    </div>
</div>

<div id="pgm-overlay">
    <div class="pgm-tabs">
        <div class="tab-btn active" id="tab-p" onclick="showTab('p')">TUOTTEET</div>
        <div class="tab-btn" id="tab-m" onclick="showTab('m')">MYYJIEN HALLINTA</div>
        <div class="tab-btn" style="margin-left:auto; background:#b71c1c" onclick="togglePGM()">SULJE</div>
    </div>
    <div id="pgm-p" class="pgm-content">
        <input type="text" id="p-n" placeholder="Nimi"> <input type="number" id="p-p" placeholder="snt">
        <select id="p-g"></select> <button onclick="addP()">LISÄÄ</button>
        <table id="t-p"></table>
    </div>
    <div id="pgm-m" class="pgm-content" style="display:none">
        <input type="text" id="m-id" placeholder="ID"> <input type="text" id="m-name" placeholder="Nimi">
        <button onclick="addClerk()">LISÄÄ MYYJÄ</button>
        <table id="t-m"></table>
    </div>
</div>

<script>
    let db = {
        prods: [],
        groups: [{id:1,name:"OLUET"},{id:2,name:"SIIDERIT"},{id:3,name:"DRINKIT"},{id:4,name:"SHOTIT"},{id:5,name:"VIRVOKKEET"},{id:6,name:"VIINIT"},{id:7,name:"RUOKA"},{id:8,name:"ALE/TOIM"}],
        clerks: [{id:"1", name:"ADMIN"},{id:"123", name:"KASSA 1"}], giftcards: {}, sysPass: "94610758"
    };

    let cart = []; let buffer = ""; let xQty = 1; let currentClerk = null; let activeG = 1; let isReturn = false;

    const setup = () => {
        // G1: OLUET
        ["KARHU 0.4L","KARHU 0.5L","SANDELS 0.5L","AURA 0.5L","IPA 0.5L"].forEach(n => db.prods.push({name:n, price:750, gid:1}));
        // G2: SIIDERI/LONKERO
        ["LONKERO","LONKERO RED","HAPPY JOE","CROWMOOR"].forEach(n => db.prods.push({name:n, price:800, gid:2}));
        // G3: DRINKIT
        ["GT","MOSCOW MULE","KELKKA","VODKA REDBULL","NEGRONI"].forEach(n => db.prods.push({name:n, price:1200, gid:3}));
        // G4: SHOTIT (Kaikki mukana!)
        db.prods.push({name:"FISU 4CL", price:700, gid:4}, {name:"JÄGER 4CL", price:700, gid:4}, {name:"MINTTU 4CL", price:700, gid:4}, {name:"SALMARI 4CL", price:700, gid:4}, {name:"TEQUILA", price:750, gid:4}, {name:"HOT SHOT", price:850, gid:4}, {name:"FERNET BRANCA", price:750, gid:4}, {name:"SAMBUCA", price:750, gid:4});
        // G5: VIRVOKKEET
        ["COLA","COLA ZERO","SPRITE","VESI","REDBULL"].forEach(n => db.prods.push({name:n, price:400, gid:5}));
        // G6: VIINIT
        ["VALKOVIINI 12CL","PUNAVIINI 12CL","SKUMPPA"].forEach(n => db.prods.push({name:n, price:900, gid:6}));
        // G7: RUOKA
        ["BURGER","RANSKALAISET","PIZZA SLICE"].forEach(n => db.prods.push({name:n, price:1200, gid:7}));
        // G8: ALE
        db.prods.push({name:"ALE -1.00€", price:100, gid:8}, {name:"HUKKA/0€", price:0, gid:8});
    };

    document.getElementById('lock-input').onkeypress = (e) => {
        if(e.key==='Enter' && e.target.value===db.sysPass) {
            document.getElementById('system-lock').style.display='none';
            document.getElementById('pos-container').style.display='grid';
            setup(); renderUI();
        }
    };

    function num(v) { buffer += v; updateDisplay(); }
    function clearBuffer() { buffer = ""; xQty = 1; updateDisplay(); }
    function multiplier() { xQty = buffer==="" ? 1 : parseInt(buffer); buffer = ""; updateDisplay(); }
    function updateDisplay() { 
        let val = buffer==="" ? (xQty>1 ? xQty+" X" : "0.00") : (parseInt(buffer)/100).toFixed(2);
        document.getElementById('buf-val').innerText = val; 
    }

    function clerkLogin() {
        let c = db.clerks.find(x => x.id === buffer);
        if(c) { currentClerk = c; document.getElementById('st-clerk').innerText = c.name; clearBuffer(); }
        else { alert("VIRHE"); clearBuffer(); }
    }

    function addProd(p) {
        if(!currentClerk) return alert("KIRJAUDU SISÄÄN!");
        let price = buffer !== "" ? parseInt(buffer)/100 : p.price/100;
        if(p.gid === 8 || isReturn) price = -Math.abs(price);
        cart.push({name: p.name, price: price, qty: xQty});
        buffer = ""; xQty = 1; updateReceipt(); updateDisplay();
    }

    function updateReceipt() {
        let total = cart.reduce((a,b)=>a+(b.price*b.qty), 0);
        document.getElementById('receipt-area').innerText = cart.map(i => `${(i.qty>1?i.qty+'x ':'')+i.name.padEnd(20).substring(0,20)} ${(i.price*i.qty).toFixed(2).padStart(8)}`).join('\n') || "VALMIS";
    }

    function showSubtotal() {
        let total = cart.reduce((a,b)=>a+(b.price*b.qty), 0);
        document.getElementById('buf-val').innerText = "YHT: " + total.toFixed(2);
    }

    function processCard() {
        if(cart.length===0) return;
        let total = cart.reduce((a,b)=>a+(b.price*b.qty), 0);
        document.getElementById('term-sum').innerText = total.toFixed(2) + " €";
        document.getElementById('term-sim').style.display='flex';
        setTimeout(() => { document.getElementById('term-sim').style.display='none'; finalize("KORTTI"); }, 1200);
    }

    function payCash() {
        if(cart.length===0) return;
        let total = cart.reduce((a,b)=>a+(b.price*b.qty), 0);
        let cash = buffer==="" ? total : parseInt(buffer)/100;
        finalize("KÄTEINEN", cash, cash-total);
    }

    function finalize(m, p, c=0) {
        let total = cart.reduce((a,b)=>a+(b.price*b.qty), 0);
        let txt = "     *** KUITTI ***\n\n" + cart.map(i => `${(i.qty>1?i.qty+'x ':'')+i.name.padEnd(20).substring(0,20)} ${(i.price*i.qty).toFixed(2).padStart(8)}`).join('\n');
        txt += `\n${"-".repeat(29)}\nYHTEENSÄ: ${total.toFixed(2).padStart(18)} EUR\n${m}: ${total.toFixed(2).padStart(10)} EUR`;
        document.getElementById('receipt-area').innerText = txt;
        cart = []; clearBuffer(); isReturn = false; document.getElementById('btn-ret').style.background = "";
    }

    function sellGiftCard() {
        let val = buffer==="" ? 50 : parseInt(buffer)/100;
        let code = "L" + Math.floor(10000+Math.random()*89999);
        db.giftcards[code] = val;
        cart.push({name: "LAHJA "+code, price: val, qty: 1});
        updateReceipt(); clearBuffer();
    }

    function payGiftCard() {
        let code = prompt("KOODI:");
        if(db.giftcards[code]) finalize("LAHJA");
    }

    function toggleReturn() { isReturn = !isReturn; document.getElementById('btn-ret').style.background = isReturn ? "yellow" : ""; }
    function voidLast() { cart.pop(); updateReceipt(); }
    function resetPOS() { cart=[]; clearBuffer(); updateReceipt(); isReturn=false; }

    function renderUI() {
        document.getElementById('group-grid').innerHTML = db.groups.map(g => `<div class="btn c-group ${g.id == activeG ? 'active-group' : ''}" onclick="activeG=${g.id};renderUI()">${g.name}</div>`).join('');
        document.getElementById('product-grid').innerHTML = db.prods.filter(p => p.gid == activeG).map(p => `<div class="btn c-prod" onclick='addProd(${JSON.stringify(p)})'><span>${p.name}</span><b style="margin-top:auto; font-size:18px;">${(p.price/100).toFixed(2)}€</b></div>`).join('');
    }

    function togglePGM() {
        let o = document.getElementById('pgm-overlay');
        o.style.display = (o.style.display==='flex'?'none':'flex');
        if(o.style.display==='flex') renderPGM();
    }

    function showTab(t) {
        document.getElementById('pgm-p').style.display = t==='p'?'block':'none';
        document.getElementById('pgm-m').style.display = t==='m'?'block':'none';
        document.getElementById('tab-p').classList.toggle('active', t==='p');
        document.getElementById('tab-m').classList.toggle('active', t==='m');
        renderPGM();
    }

    function renderPGM() {
        document.getElementById('t-p').innerHTML = `<tr><th>PLU</th><th>Hinta</th><th>X</th></tr>` + db.prods.map((p,i) => `<tr><td>${p.name}</td><td>${p.price/100}€</td><td><button onclick="db.prods.splice(${i},1);renderPGM();renderUI()">X</button></td></tr>`).join('');
        document.getElementById('t-m').innerHTML = `<tr><th>ID</th><th>Nimi</th><th>X</th></tr>` + db.clerks.map((c,i) => `<tr><td>${c.id}</td><td>${c.name}</td><td><button onclick="db.clerks.splice(${i},1);renderPGM()">X</button></td></tr>`).join('');
        document.getElementById('p-g').innerHTML = db.groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
    }

    function addP() {
        let n = document.getElementById('p-n').value; let p = parseInt(document.getElementById('p-p').value); let g = parseInt(document.getElementById('p-g').value);
        if(n && !isNaN(p)) { db.prods.push({name:n.toUpperCase(), price:p, gid:g}); renderPGM(); renderUI(); }
    }

    function addClerk() {
        let id = document.getElementById('m-id').value; let name = document.getElementById('m-name').value;
        if(id && name) { db.clerks.push({id:id, name:name.toUpperCase()}); renderPGM(); }
    }

    setInterval(() => document.getElementById('st-time').innerText = new Date().toLocaleTimeString('fi-FI'), 1000);
</script>
</body>
</html>
