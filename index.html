<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Web-QT6000 Pro - ENTERPRISE V8</title>
    <style>
        :root {
            --pos-blue: #33367c; --screen-gray: #b0b8c0; --btn-num: #4a4d4e;
            --btn-red: #8c3b3b; --btn-blue: #3a5a8c; --btn-green: #3b8c4a;
            --btn-yellow: #a69e3a; --prod-brown: #8c583b; --btn-purple: #6a3b8c;
            --btn-mixer: #2e4a3e; --btn-spirit: #5d4037;
        }
        body { margin: 0; background: #000; font-family: 'Arial Narrow', sans-serif; color: white; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #system-lock { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #lock-input { background: #111; border: 2px solid #444; color: #0f0; font-size: 40px; text-align: center; padding: 15px; width: 300px; border-radius: 10px; outline: none; }

        #term-sim { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9000; align-items: center; justify-content: center; }
        .term-box { background: #222; border: 4px solid #555; width: 320px; padding: 25px; border-radius: 15px; text-align: center; color: #fff; font-family: 'Courier New', monospace; }
        .term-screen { background: #040; border: 2px solid #080; height: 120px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #0f0; }

        #pos-container { display: none; width: 100vw; height: 100vh; grid-template-rows: 35px 1fr; padding: 5px; gap: 5px; box-sizing: border-box; }
        #status-bar { background: var(--pos-blue); display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; padding: 0 15px; font-size: 14px; border: 1px solid #444; }

        #main-layout { display: grid; grid-template-columns: 460px 1fr; gap: 10px; overflow: hidden; }
        #left-col { display: flex; flex-direction: column; gap: 5px; height: 100%; }
        
        #receipt-area { background: var(--screen-gray); height: 42%; border: 3px solid #555; color: #111; font-family: monospace; padding: 12px; overflow-y: auto; white-space: pre; font-size: 14px; line-height: 1.1; }
        
        #input-line { background: #000; height: 100px; border: 3px solid #555; display: flex; flex-direction: column; justify-content: center; padding: 0 15px; }
        #buf-msg { color: #0f0; font-size: 18px; text-transform: uppercase; }
        #buf-val { color: #0f0; font-size: 44px; font-weight: bold; text-align: right; }

        #keypad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; flex-grow: 1; }
        #product-area { display: grid; grid-template-rows: 1fr 160px; gap: 10px; height: 100%; }
        #product-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 50px; gap: 5px; overflow-y: auto; }
        #group-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 8px; border-top: 3px solid #444; padding-top: 10px; }

        .btn { border-radius: 4px; border: 1px solid #333; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; font-size: 10px; text-transform: uppercase; user-select: none; }
        .btn:active { filter: brightness(1.6); }
        .c-num { background: var(--btn-num); font-size: 20px; }
        .c-red { background: var(--btn-red); }
        .c-blue { background: var(--btn-blue); }
        .c-green { background: var(--btn-green); }
        .c-yellow { background: var(--btn-yellow); color: #000; }
        .c-prod { background: var(--prod-brown); }
        .c-mixer { background: var(--btn-mixer); font-size: 9px; }
        .c-spirit { background: var(--btn-spirit); }
        .c-promo { background: #1a5276; border: 1px solid #5dade2; }
        .active-group { border: 2px solid #0f0; background: #555; }

        #pgm-overlay { display: none; position: absolute; z-index: 11000; inset: 15px; background: #111; border: 2px solid var(--btn-blue); padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="system-lock">
    <h1 style="letter-spacing: 10px; color: #555;">QT-6000 PRO</h1>
    <input type="password" id="lock-input" placeholder="ACCESS CODE" autocomplete="off">
</div>

<div id="term-sim">
    <div class="term-box">
        <div class="term-screen" id="term-display">
            <div>YHTEENSÄ</div>
            <div id="term-sum" style="font-size: 28px;">0.00 €</div>
            <div id="term-status" style="margin-top:10px; font-size: 14px;">ODOTTAA KORTTIA...</div>
        </div>
        <div style="font-size: 11px; color: #888;">SYÖTÄ KORTTI TAI LÄHIMAKSU</div>
    </div>
</div>

<div id="pos-container">
    <div id="status-bar">
        <span id="st-clerk">MYYJÄ: -</span>
        <span style="text-align:center">ENTERPRISE SYSTEM V8.0</span>
        <span id="st-time">00:00:00</span>
    </div>

    <div id="main-layout">
        <div id="left-col">
            <div id="receipt-area">VALMIS</div>
            <div id="input-line">
                <div id="buf-msg">ODOTTAA</div>
                <div id="buf-val">0.00</div>
            </div>
            <div id="keypad">
                <div class="btn c-green" onclick="resetPOS()">ESC</div>
                <div class="btn c-num" onclick="clearBuffer()">C</div>
                <div class="btn c-red" onclick="voidLast()">POISTA</div>
                <div class="btn c-red" onclick="voidFull()">VOID</div>
                <div class="btn c-blue" onclick="togglePGM()">PGM</div>
                
                <div class="btn c-num" onclick="num('7')">7</div>
                <div class="btn c-num" onclick="num('8')">8</div>
                <div class="btn c-num" onclick="num('9')">9</div>
                <div class="btn c-blue" onclick="processCard()">KORTTI</div>
                <div class="btn c-yellow" onclick="clerkLogin()">MYYJÄ</div>
                
                <div class="btn c-num" onclick="num('4')">4</div>
                <div class="btn c-num" onclick="num('5')">5</div>
                <div class="btn c-num" onclick="num('6')">6</div>
                <div class="btn c-green" style="grid-row: span 2" onclick="showSubtotal()">VÄLI<br>SUMMA</div>
                <div class="btn c-yellow" style="font-size: 24px;" onclick="multiplier()">X</div>
                
                <div class="btn c-num" onclick="num('1')">1</div>
                <div class="btn c-num" onclick="num('2')">2</div>
                <div class="btn c-num" onclick="num('3')">3</div>
                <div class="btn c-purple" style="background:var(--btn-purple)" onclick="sellGiftCard()">MYY LAHJA</div>
                <div class="btn c-purple" style="background:var(--btn-purple)" onclick="payGiftCard()">L-MAKSU</div>
                
                <div class="btn c-num" onclick="num('0')">0</div>
                <div class="btn c-num" onclick="num('00')">00</div>
                <div class="btn c-red" id="btn-ret" onclick="toggleReturn()">PALAUTUS</div>
                <div class="btn c-green" style="grid-column: span 2" onclick="payCash()">KÄTEINEN</div>
            </div>
        </div>

        <div id="product-area">
            <div id="product-grid"></div>
            <div id="group-grid"></div>
        </div>
    </div>
</div>

<div id="pgm-overlay">
    <h2>PGM - TUOTEHALLINTA</h2>
    <div style="background:#222; padding:15px; margin-bottom:20px;">
        <input type="text" id="p-name" placeholder="Nimi">
        <input type="number" id="p-price" placeholder="Hinta (snt)">
        <select id="p-group"></select>
        <button onclick="saveProduct()">LISÄÄ TUOTE</button>
    </div>
    <div id="pgm-list"></div>
    <button class="btn c-red" style="width:120px; height:40px; margin-top:20px;" onclick="togglePGM()">SULJE</button>
</div>

<script>
    let db = {
        prods: [],
        groups: [
            {id:1, name:"OLUET"}, {id:2, name:"SIIDERIT"}, {id:3, name:"DRINKIT"}, {id:4, name:"VIINAT 4CL"},
            {id:5, name:"MIXERIT"}, {id:6, name:"VIINIT"}, {id:7, name:"MUUT"}, {id:8, name:"TOIMINTO/ALE"}
        ],
        giftcards: {}, clerks: [{id:"1", name:"ADMIN"}], sysPass: "94610758"
    };

    const initData = () => {
        const beers = ["KARHU","SANDELS","HEINEKEN","GUINNESS","CORONA","BLANC","LAPIN KULTA","AURA","IPA","APA"];
        beers.forEach(b => {
            db.prods.push({name: b+" 0.5L", price: 750, gid: 1});
            db.prods.push({name: b+" 0.4L", price: 650, gid: 1});
        });
        const ciders = ["HAPPY JOE","SOMMERSBY","STRONG BOW","CROWMOOR","MAGNERS"];
        ciders.forEach(c => db.prods.push({name: c, price: 820, gid: 2}));
        const cocktails = ["APEROL SPRITZ", "MOJITO", "MARGARITA", "NEGRONI", "G&T", "VODKA REDBULL", "MOSCOW MULE", "WHISKY SOUR", "TOM COLLINS", "PINA COLADA"];
        cocktails.forEach(c => db.prods.push({name: c, price: 1250, gid: 3}));
        const spirits = ["VODKA", "GIN", "JAMESON", "JACK DANIELS", "JÄGER", "MINTTU", "FISU", "SALMARI", "BACARDI", "HENNESSY"];
        spirits.forEach(s => db.prods.push({name: s + " 4CL", price: 700, gid: 4}));
        const mixers = ["COLA", "SPRITE", "FANTA", "TUOREMEHU", "SODAVESI", "TONIC", "GINGER ALE", "REDBULL", "MAITO", "BOOSTER"];
        mixers.forEach(m => db.prods.push({name: m, price: 150, gid: 5}));
        db.prods.push({name: "KOMBO: OLUT+SHOT", price: -200, gid: 8, combo: ["0.5L", "4CL"]});
    };

    let cart = []; let buffer = ""; let currentClerk = null; let activeG = 1; let isReturn = false; let xQty = 1;

    document.getElementById('lock-input').onkeypress = (e) => {
        if(e.key === 'Enter') {
            if(e.target.value === db.sysPass) {
                document.getElementById('system-lock').style.display = 'none';
                document.getElementById('pos-container').style.display = 'grid';
                initData(); renderUI();
            } else { alert("PÄÄSY ESTETTY"); e.target.value = ""; }
        }
    };

    function num(v) { buffer += v; updateDisplay(); }
    function clearBuffer() { buffer = ""; updateDisplay(); }
    function multiplier() { 
        if(buffer === "") { xQty = 1; } 
        else { xQty = parseInt(buffer); }
        setMsg("MÄÄRÄ", xQty + " X");
        buffer = "";
    }
    function updateDisplay() { 
        document.getElementById('buf-val').innerText = buffer==="" ? (xQty > 1 ? xQty + " X" : "0.00") : (parseInt(buffer)/100).toFixed(2); 
    }

    function clerkLogin() {
        const c = db.clerks.find(x => x.id === buffer);
        if(c) { currentClerk = c; document.getElementById('st-clerk').innerText = "MYYJÄ: " + c.name; clearBuffer(); setMsg("VALMIS", "0.00"); }
    }

    function addProd(p) {
        if(!currentClerk) return alert("KIRJAUDU SISÄÄN!");
        
        let price = p.price/100;
        if(isReturn) price = -Math.abs(price);

        // Rivien yhdistämislogiikka
        let existing = cart.find(i => i.name === p.name && i.price === price);
        if(existing) {
            existing.qty += xQty;
        } else {
            cart.push({name: p.name, price: price, qty: xQty});
        }

        setMsg(p.name, (price * xQty).toFixed(2));
        xQty = 1; // nollaa kerroin
        updateReceiptLines();
    }

    function updateReceiptLines() {
        let txt = cart.map(i => {
            let line = i.qty > 1 ? `${i.qty} x ${i.name}` : i.name;
            return `${line.padEnd(22).substring(0,22)} ${(i.price * i.qty).toFixed(2).padStart(8)}`;
        }).join('\n');
        document.getElementById('receipt-area').innerText = txt;
    }

    function showSubtotal() {
        let total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
        setMsg("VÄLISUMMA", total.toFixed(2));
    }

    function payCash() {
        if(cart.length === 0) return;
        let total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
        let cash = buffer === "" ? total : parseInt(buffer)/100;
        if(cash < total) return alert("SUMMA PUUTTUU");
        
        setMsg("VAIHTORAHA", (cash - total).toFixed(2));
        printFinalReceipt("KÄTEINEN", cash, (cash-total));
        cart = []; clearBuffer(); xQty = 1;
    }

    function processCard() {
        if(cart.length === 0) return;
        let total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
        document.getElementById('term-sum').innerText = total.toFixed(2) + " €";
        document.getElementById('term-sim').style.display = 'flex';
        
        setTimeout(() => {
            document.getElementById('term-sim').style.display = 'none';
            printFinalReceipt("KORTTI", total, 0);
            cart = []; clearBuffer(); xQty = 1;
        }, 2500);
    }

    function printFinalReceipt(mode, pay, change) {
        let total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
        let txt = "     *** KUITTI ***\n\n";
        txt += cart.map(i => {
            let line = i.qty > 1 ? `${i.qty} x ${i.name}` : i.name;
            return `${line.padEnd(20).substring(0,20)} ${(i.price * i.qty).toFixed(2).padStart(10)}`;
        }).join('\n');
        txt += `\n${"-".repeat(31)}`;
        txt += `\nYHTEENSÄ: ${total.toFixed(2).padStart(18)} EUR`;
        txt += `\n${mode}: ${pay.toFixed(2).padStart(19)} EUR`;
        txt += `\nVAIHTO: ${change.toFixed(2).padStart(20)} EUR`;
        txt += `\n\nKIITOS KÄYNNISTÄ!`;
        document.getElementById('receipt-area').innerText = txt;
    }

    function sellGiftCard() {
        let val = buffer === "" ? 50 : parseInt(buffer)/100;
        let code = "L" + Math.floor(1000+Math.random()*8999);
        db.giftcards[code] = val;
        cart.push({name: "LAHJA "+code, price: val, qty: 1});
        setMsg("LAHJA MYYTY", val.toFixed(2));
        updateReceiptLines(); clearBuffer();
    }

    function payGiftCard() {
        let code = prompt("SYÖTÄ KOODI:");
        if(db.giftcards[code]) {
            let total = cart.reduce((a,b)=>a+(b.price*b.qty), 0);
            if(db.giftcards[code] >= total) {
                db.giftcards[code] -= total;
                alert("MAKSETTU. SALDO: " + db.giftcards[code].toFixed(2) + "€");
                printFinalReceipt("LAHJA", total, 0);
                cart = []; updateReceiptLines();
            } else { alert("SALDO EI RIITÄ"); }
        }
    }

    function setMsg(m, v) { document.getElementById('buf-msg').innerText = m; document.getElementById('buf-val').innerText = v; }
    function resetPOS() { cart = []; clearBuffer(); xQty = 1; document.getElementById('receipt-area').innerText = "VALMIS"; setMsg("VALMIS", "0.00"); isReturn = false; }
    function voidLast() { cart.pop(); updateReceiptLines(); showSubtotal(); }
    function voidFull() { cart = []; updateReceiptLines(); setMsg("VOID", "0.00"); }
    function toggleReturn() { isReturn = !isReturn; document.getElementById('btn-ret').style.background = isReturn?"yellow":""; }

    function renderUI() {
        document.getElementById('product-grid').innerHTML = db.prods.filter(p => p.gid == activeG).map(p => `
            <div class="btn ${activeG==8?'c-promo':(activeG==5?'c-mixer':(activeG==4?'c-spirit':'c-prod'))}" onclick='addProd(${JSON.stringify(p)})'>${p.name}<br>${(p.price/100).toFixed(2)}€</div>
        `).join('');
        document.getElementById('group-grid').innerHTML = db.groups.map(g => `
            <div class="btn c-group ${g.id == activeG ? 'active-group' : ''}" onclick="activeG=${g.id};renderUI()">${g.name}</div>
        `).join('');
        document.getElementById('p-group').innerHTML = db.groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
    }

    function togglePGM() { document.getElementById('pgm-overlay').style.display = (document.getElementById('pgm-overlay').style.display==="block" ? "none" : "block"); renderPGMList(); }
    function renderPGMList() { document.getElementById('pgm-list').innerHTML = db.prods.map((p,i) => `<div style="font-size:12px; border-bottom:1px solid #333; padding:5px;">${p.name} - ${p.price/100}€ <button onclick="db.prods.splice(${i},1);renderPGMList();renderUI();">X</button></div>`).join(''); }
    function saveProduct() {
        let n = document.getElementById('p-name').value;
        let p = parseInt(document.getElementById('p-price').value);
        let g = parseInt(document.getElementById('p-group').value);
        if(n && p) { db.prods.push({name:n, price:p, gid:g}); renderPGMList(); renderUI(); }
    }

    setInterval(() => document.getElementById('st-time').innerText = new Date().toLocaleTimeString('fi-FI'), 1000);
</script>
</body>
</html>
