<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Web-QT6000 POS - Full Screen Mode</title>
    <style>
        :root {
            --casio-bg: #1a1a1a;
            --screen-bg: #cbd5e0;
            --btn-gray: #4a4d4e;
            --btn-blue: #3a5a8c;
            --btn-green: #3b8c4a;
            --btn-red: #8c3b3b;
            --btn-yellow: #a69e3a;
        }

        body { margin: 0; background: #000; font-family: 'Arial Narrow', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; }
        
        #pos-container { width: 100vw; height: 100vh; background: var(--casio-bg); border: 4px solid #333; display: grid; grid-template-rows: auto 1fr auto; gap: 5px; padding: 10px; box-sizing: border-box; position: relative; }

        /* YLÄPALKKI */
        #status-bar { background: #33367c; padding: 8px 20px; display: flex; justify-content: space-between; font-size: 16px; border: 1px solid #555; }

        /* KESKIOSA: NÄYTTÖ JA TUOTTEET */
        #main-section { display: grid; grid-template-columns: 400px 1fr; gap: 10px; overflow: hidden; }

        #display-area { background: var(--screen-bg); border: 4px solid #666; color: black; font-family: monospace; padding: 15px; overflow-y: auto; font-size: 18px; display: flex; flex-direction: column; }
        #reg-screen { flex: 1; }
        
        #input-buffer { 
            background: #000; color: #0f0; height: 70px; border: 2px solid #555; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; font-size: 36px; font-family: 'Courier New', monospace; margin-top: 10px;
        }

        #interaction-area { display: grid; grid-template-rows: 1fr auto; gap: 10px; }

        /* TUOTERUUDUKKO */
        #product-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; overflow-y: auto; }
        #group-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; border-top: 2px solid #555; padding-top: 10px; }

        /* ALAPALKKI: NÄPPÄIMISTÖ */
        #numpad-section { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; height: 180px; }

        .btn { border-radius: 4px; border: 2px solid #555; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 14px; text-transform: uppercase; padding: 5px; }
        .btn:active { filter: brightness(1.2); transform: scale(0.98); }

        /* VÄRIT */
        .c-gray { background: var(--btn-gray); }
        .c-blue { background: var(--btn-blue); }
        .c-green { background: var(--btn-green); }
        .c-red { background: var(--btn-red); }
        .c-yellow { background: var(--btn-yellow); color: black; }
        .c-black { background: #000; border-color: #444; }

        /* PGM */
        #pgm-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #2d3436; z-index: 100; padding: 40px; box-sizing: border-box; }
        .pgm-content { background: white; color: black; height: 85%; overflow-y: auto; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="pos-container">
    <!-- YLÄOSA -->
    <div id="status-bar">
        <span id="st-mode">MODE: REG</span>
        <span id="st-clerk">MYYJÄ: ---</span>
        <span id="st-time">00:00:00</span>
    </div>

    <!-- KESKIOSA -->
    <div id="main-section">
        <div id="display-side">
            <div id="display-area">
                <div id="reg-screen">*** KIRJAUDU SISÄÄN ***</div>
                <div id="input-buffer">
                    <span id="buffer-label">SUMMA</span>
                    <span id="buffer-val">0.00</span>
                </div>
            </div>
        </div>

        <div id="interaction-area">
            <div id="product-grid"></div>
            <div id="group-grid"></div>
        </div>
    </div>

    <!-- ALAMUURAUS (NÄPPÄIMISTÖ) -->
    <div id="numpad-section">
        <div class="btn c-gray" onclick="num('7')">7</div>
        <div class="btn c-gray" onclick="num('8')">8</div>
        <div class="btn c-gray" onclick="num('9')">9</div>
        <div class="btn c-red" onclick="voidLast()">KORJAUS</div>
        <div class="btn c-red" id="btn-ret" onclick="toggleReturn()">PALAUTUS</div>
        <div class="btn c-blue" onclick="clerkLogin()">MYYJÄ</div>
        <div class="btn c-blue" onclick="report('X')">X-RAP</div>
        <div class="btn c-blue" onclick="report('Z')">Z-RAP</div>
        <div class="btn c-yellow" onclick="toggleMode()">PGM</div>
        <div class="btn c-green" onclick="clearAll()">ESC</div>

        <div class="btn c-gray" onclick="num('4')">4</div>
        <div class="btn c-gray" onclick="num('5')">5</div>
        <div class="btn c-gray" onclick="num('6')">6</div>
        <div class="btn c-blue">ALE %</div>
        <div class="btn c-blue">ALE €</div>
        <div class="btn c-blue">SÄILYTYS</div>
        <div class="btn c-blue">AVAA KASSA</div>
        <div class="btn c-blue">VALUUTTA</div>
        <div class="btn c-green" style="grid-row: span 2" onclick="subtotal()">VÄLI<br>SUMMA</div>
        <div class="btn c-gray" onclick="clearBuffer()">C</div>

        <div class="btn c-gray" onclick="num('1')">1</div>
        <div class="btn c-gray" onclick="num('2')">2</div>
        <div class="btn c-gray" onclick="num('3')">3</div>
        <div class="btn c-gray" onclick="num('0')">0</div>
        <div class="btn c-gray" onclick="num('00')">00</div>
        <div class="btn c-black" onclick="pay('KORTTI')">KORTTI</div>
        <div class="btn c-black" style="grid-column: span 2" onclick="pay('KÄTEINEN')">KÄTEINEN</div>
        <!-- Enter/Total on usein suurin nappi -->
    </div>

    <!-- PGM HALLINTA -->
    <div id="pgm-overlay">
        <h2>PGM - LAITTEEN HALLINTA</h2>
        <div class="pgm-content" id="pgm-tables">
            <!-- Dynaamiset taulukot tänne -->
        </div>
        <button class="btn c-red" style="width:100%; height:60px; margin-top:10px" onclick="toggleMode()">TALLENNA JA POISTU</button>
    </div>
</div>

<script>
    let db = {
        prods: [{name: "KAHVI", price: 250, gid: 1}, {name: "TEE", price: 200, gid: 1}, {name: "PULLA", price: 300, gid: 2}, {name: "LEIPÄ", price: 550, gid: 2}],
        groups: [{id: 1, name: "JUOMAT", color: "#3a5a8c"}, {id: 2, name: "RUOAT", color: "#3b8c4a"}],
        clerks: [{id: "1", name: "MYYJÄ 1"}, {id: "2", name: "MYYJÄ 2"}],
        receiptNo: 1, totals: 0
    };

    let cart = []; let buffer = ""; let currentClerk = null; let isReturn = false; let mode = "REG";

    function init() {
        const saved = localStorage.getItem('qt6000_final_db');
        if(saved) db = JSON.parse(saved);
        renderAll();
        setInterval(() => { document.getElementById('st-time').innerText = new Date().toLocaleTimeString('fi-FI'); }, 1000);
    }

    function num(v) { buffer += v; updateBuffer(); }
    function updateBuffer() { 
        const val = buffer === "" ? 0 : parseInt(buffer) / 100;
        document.getElementById('buffer-val').innerText = val.toFixed(2);
    }
    function clearBuffer() { buffer = ""; updateBuffer(); }

    function clerkLogin() {
        const c = db.clerks.find(x => x.id === buffer);
        if(c) { 
            currentClerk = c; 
            document.getElementById('st-clerk').innerText = `MYYJÄ: ${c.name}`;
            document.getElementById('reg-screen').innerText = "VALMIS";
            clearBuffer();
        } else { alert("TUNTEMATON MYYJÄ"); }
    }

    function addProd(p) {
        if(!currentClerk) return;
        let price = (buffer !== "") ? parseInt(buffer)/100 : p.price/100;
        if(isReturn) price = -Math.abs(price);
        cart.push({name: p.name, price});
        renderCart(); clearBuffer();
    }

    function renderCart() {
        const screen = document.getElementById('reg-screen');
        screen.innerHTML = cart.map(i => `<div>${i.name.padEnd(20)} ${i.price.toFixed(2).padStart(10)}</div>`).join('');
        const total = cart.reduce((a,b) => a+b.price, 0);
        document.getElementById('buffer-val').innerText = total.toFixed(2);
    }

    function pay(method) {
        if(cart.length === 0) return;
        const total = cart.reduce((a,b)=>a+b.price,0);
        db.totals += total;
        db.receiptNo++;
        save();
        cart = []; isReturn = false;
        document.getElementById('reg-screen').innerText = "KIITOS - EUR " + total.toFixed(2);
        clearBuffer();
    }

    function renderAll() {
        const gGrid = document.getElementById('group-grid');
        gGrid.innerHTML = '<div class="btn c-gray" onclick="filterG(null)">KAIKKI</div>';
        db.groups.forEach(g => {
            const b = document.createElement('div'); b.className = 'btn'; b.style.background = g.color;
            b.innerText = g.name; b.onclick = () => filterG(g.id); gGrid.appendChild(b);
        });
        filterG(null);
    }

    function filterG(id) {
        const pGrid = document.getElementById('product-grid'); pGrid.innerHTML = '';
        const list = id ? db.prods.filter(x => x.gid == id) : db.prods;
        list.forEach(p => {
            const b = document.createElement('div'); b.className = 'btn c-blue';
            b.style.height = "80px"; b.innerText = p.name; b.onclick = () => addProd(p); pGrid.appendChild(b);
        });
    }

    function toggleMode() {
        mode = (mode === "REG") ? "PGM" : "REG";
        document.getElementById('pgm-overlay').style.display = (mode === "PGM") ? "block" : "none";
        document.getElementById('st-mode').innerText = `MODE: ${mode}`;
        if(mode === "PGM") renderPgm(); else { renderAll(); save(); }
    }

    function renderPgm() {
        let html = `<h3>TUOTTEET</h3><table border="1" width="100%">`;
        db.prods.forEach(p => html += `<tr><td>${p.name}</td><td>${p.price}s</td><td>GID:${p.gid}</td></tr>`);
        html += `</table><button onclick="pgmAdd('prod')">+ LISÄÄ TUOTE</button>`;
        
        html += `<h3>MYYJÄT</h3><table border="1" width="100%">`;
        db.clerks.forEach(c => html += `<tr><td>ID: ${c.id}</td><td>${c.name}</td></tr>`);
        html += `</table><button onclick="pgmAdd('clerk')">+ LISÄÄ MYYJÄ</button>`;
        
        document.getElementById('pgm-tables').innerHTML = html;
    }

    function pgmAdd(type) {
        if(type === 'prod') db.prods.push({name: prompt("Nimi"), price: parseInt(prompt("Hinta (s)")), gid: parseInt(prompt("GID"))});
        if(type === 'clerk') db.clerks.push({id: prompt("ID"), name: prompt("Nimi")});
        renderPgm();
    }

    function save() { localStorage.setItem('qt6000_final_db', JSON.stringify(db)); }
    function toggleReturn() { isReturn = !isReturn; document.getElementById('btn-ret').style.background = isReturn ? "yellow" : ""; }
    function voidLast() { cart.pop(); renderCart(); }
    function clearAll() { cart = []; clearBuffer(); renderCart(); }
    function subtotal() { renderCart(); }
    function report(t) { alert(`${t}-RAPORTTI: Myynti yhteensä ${db.totals.toFixed(2)} EUR`); if(t==='Z') db.totals = 0; save(); }

    init();
</script>
</body>
</html>
