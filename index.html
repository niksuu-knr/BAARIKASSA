<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Web-QT6000 - Täydellinen Versio</title>
    <style>
        :root {
            --pos-blue: #33367c;
            --screen-gray: #b0b8c0;
            --btn-num: #4a4d4e;
            --btn-red: #8c3b3b;
            --btn-blue: #3a5a8c;
            --btn-green: #3b8c4a;
            --btn-yellow: #a69e3a;
            --prod-brown: #8c583b;
        }

        body { margin: 0; background: #000; font-family: 'Arial Narrow', sans-serif; color: white; height: 100vh; overflow: hidden; }
        
        #pos-container { display: grid; grid-template-rows: 35px 1fr; height: 100vh; padding: 5px; gap: 5px; box-sizing: border-box; }

        /* YLÄPALKKI */
        #status-bar { background: var(--pos-blue); display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; padding: 0 15px; font-size: 14px; border: 1px solid #444; }

        /* PÄÄALUE */
        #main-layout { display: grid; grid-template-columns: 450px 1fr; gap: 10px; overflow: hidden; }

        /* VASEN SARAKE (KUITTI, PUSKURI, NÄPPÄIMISTÖ) */
        #left-col { display: flex; flex-direction: column; gap: 5px; height: 100%; }

        #receipt-area { background: var(--screen-gray); height: 45%; border: 3px solid #555; color: #111; font-family: monospace; padding: 10px; overflow-y: auto; white-space: pre; font-size: 14px; }
        
        #input-line { background: #000; height: 80px; border: 3px solid #555; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        #buf-val { color: #0f0; font-family: monospace; font-size: 42px; font-weight: bold; }
        #buf-msg { color: #0f0; font-family: monospace; font-size: 28px; font-weight: bold; }

        #keypad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; flex-grow: 1; padding-bottom: 5px; }

        /* OIKEA SARAKE (TUOTTEET) */
        #product-area { display: flex; flex-direction: column; gap: 10px; }
        #group-tabs { display: flex; gap: 5px; }
        #product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

        .btn { border-radius: 4px; border: 1px solid #333; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; font-size: 13px; text-transform: uppercase; box-shadow: inset 0 1px 1px rgba(255,255,255,0.1); }
        .btn:active { filter: brightness(1.3); }
        
        .c-num { background: var(--btn-num); }
        .c-red { background: var(--btn-red); }
        .c-blue { background: var(--btn-blue); }
        .c-green { background: var(--btn-green); }
        .c-yellow { background: var(--btn-yellow); color: #000; }
        .c-black { background: #000; border: 1px solid #444; }
        .c-prod { background: var(--prod-brown); height: 75px; }

        .span-2-v { grid-row: span 2; height: auto !important; }

        /* PGM OVERLAY */
        #pgm-overlay { display: none; position: absolute; inset: 20px; background: #2d3436; border: 4px solid #fff; z-index: 1000; padding: 20px; overflow-y: auto; }
        .pgm-table { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; }
        .pgm-table td, .pgm-table th { border: 1px solid #ccc; padding: 5px; }
    </style>
</head>
<body>

<div id="pos-container">
    <div id="status-bar">
        <span id="st-mode">REG MANAGER</span>
        <span style="text-align: center;" id="st-receipt">Kuitti: 000000</span>
        <span style="text-align: right;" id="st-time">00.00.00</span>
    </div>

    <div id="main-layout">
        <div id="left-col">
            <div id="receipt-area">*** KIRJAUDU SISÄÄN ***</div>
            
            <div id="input-line">
                <span id="buf-val">0.00</span>
                <span id="buf-msg">VALMIS</span>
            </div>

            <div id="keypad">
                <div class="btn c-green" onclick="clearCart()">ESC</div>
                <div class="btn c-num" onclick="clearBuffer()">C</div>
                <div class="btn c-red" onclick="voidLast()">POISTA</div>
                <div class="btn c-red" onclick="voidFull()">MITÄTÖI</div>
                <div class="btn c-red" id="btn-ret" onclick="toggleReturn()">PALAUTUS</div>

                <div class="btn c-num" onclick="num('7')">7</div>
                <div class="btn c-num" onclick="num('8')">8</div>
                <div class="btn c-num" onclick="num('9')">9</div>
                <div class="btn c-blue">ALE %</div>
                <div class="btn c-yellow" onclick="clerkLogin()">MYYJÄ</div>

                <div class="btn c-num" onclick="num('4')">4</div>
                <div class="btn c-num" onclick="num('5')">5</div>
                <div class="btn c-num" onclick="num('6')">6</div>
                <div class="btn c-blue">ALE €</div>
                <div class="btn c-blue" onclick="togglePGM()">PGM TILA</div>

                <div class="btn c-num" onclick="num('1')">1</div>
                <div class="btn c-num" onclick="num('2')">2</div>
                <div class="btn c-num" onclick="num('3')">3</div>
                <div class="btn c-green span-2-v" onclick="subtotal()">VÄLI<br>SUMMA</div>
                <div class="btn c-blue" onclick="pay('KORTTI')">KORTTI</div>

                <div class="btn c-num" onclick="num('0')">0</div>
                <div class="btn c-num" onclick="num('00')">00</div>
                <div class="btn c-num">.</div>
                <div class="btn c-black" onclick="pay('KÄTEINEN')">KÄTEINEN</div>
            </div>
        </div>

        <div id="product-area">
            <div id="group-tabs"></div>
            <div id="product-grid"></div>
        </div>
    </div>
</div>

<div id="pgm-overlay">
    <h2>PGM - HALLINTA</h2>
    <button onclick="pgmAdd('p')">Lisää tuote</button>
    <button onclick="pgmAdd('c')">Lisää myyjä</button>
    <div id="pgm-data"></div>
    <button class="btn c-red" style="width: 100%; height: 50px; margin-top: 20px;" onclick="togglePGM()">SULJE PGM</button>
</div>

<script>
    let db = {
        prods: [{name: "HAMBURGER", price: 850, gid: 1}, {name: "SIIVET 10", price: 1200, gid: 1}],
        groups: [{id: 1, name: "RUOKA", color: "#8c583b"}],
        clerks: [{id: "1", name: "KALLE"}],
        receiptNo: 1
    };

    let cart = []; let buffer = ""; let currentClerk = null; let isReturn = false; let mode = "REG";

    function init() {
        const saved = localStorage.getItem('qt6000_master');
        if(saved) db = JSON.parse(saved);
        renderUI();
        setInterval(updateClock, 1000);
    }

    function num(v) { buffer += v; updateDisplay(); }
    function clearBuffer() { buffer = ""; updateDisplay(); }
    
    function updateDisplay() {
        const val = buffer === "" ? "0.00" : (parseInt(buffer)/100).toFixed(2);
        document.getElementById('buf-val').innerText = val;
        document.getElementById('buf-msg').innerText = isReturn ? "PALAUTUS" : (buffer === "" ? "VALMIS" : "SYÖTTÖ");
    }

    function clerkLogin() {
        const c = db.clerks.find(x => x.id === buffer);
        if(c) {
            currentClerk = c;
            document.getElementById('receipt-area').innerText = "MYYJÄ: " + c.name + "\nVALMIS";
            clearBuffer();
        } else { alert("VIRHEELLINEN MYYJÄ-ID"); }
    }

    function addProd(p) {
        if(!currentClerk) return;
        let price = (buffer !== "") ? parseInt(buffer) : p.price;
        if(isReturn) price = -Math.abs(price);
        cart.push({name: p.name, price: price / 100});
        renderCart(); clearBuffer();
    }

    function renderCart() {
        const area = document.getElementById('receipt-area');
        let html = cart.map(i => `${i.name.padEnd(20)} ${i.price.toFixed(2).padStart(10)}`).join('\n');
        area.innerText = html;
        area.scrollTop = area.scrollHeight;
    }

    function subtotal() {
        if(cart.length === 0) return;
        const total = cart.reduce((a, b) => a + b.price, 0);
        document.getElementById('buf-val').innerText = total.toFixed(2);
        document.getElementById('buf-msg').innerText = "YHTEENSÄ";
    }

    function pay(m) {
        if(cart.length === 0) return;
        db.receiptNo++;
        document.getElementById('st-receipt').innerText = "Kuitti: " + String(db.receiptNo).padStart(6, '0');
        cart = []; isReturn = false;
        document.getElementById('receipt-area').innerText = "KIITOS - " + m;
        save(); clearBuffer();
    }

    function renderUI() {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = db.prods.map(p => `
            <div class="btn c-prod" onclick='addProd(${JSON.stringify(p)})'>${p.name}<br>${(p.price/100).toFixed(2)}</div>
        `).join('');
    }

    function togglePGM() {
        mode = (mode === "REG") ? "PGM" : "REG";
        document.getElementById('pgm-overlay').style.display = (mode === "PGM") ? "block" : "none";
        if(mode === "PGM") renderPGM(); else { renderUI(); save(); }
    }

    function renderPGM() {
        let h = "<h3>TUOTTEET</h3><table class='pgm-table'><tr><th>Nimi</th><th>Hinta(s)</th></tr>";
        db.prods.forEach(p => h += `<tr><td>${p.name}</td><td>${p.price}</td></tr>`);
        h += "</table>";
        document.getElementById('pgm-data').innerHTML = h;
    }

    function pgmAdd(type) {
        if(type === 'p') db.prods.push({name: prompt("Nimi"), price: parseInt(prompt("Hinta sentteinä")), gid: 1});
        renderPGM();
    }

    function save() { localStorage.setItem('qt6000_master', JSON.stringify(db)); }
    function voidLast() { cart.pop(); renderCart(); }
    function voidFull() { cart = []; renderCart(); }
    function toggleReturn() { isReturn = !isReturn; document.getElementById('btn-ret').style.background = isReturn ? "yellow" : ""; updateDisplay(); }
    function updateClock() {
        const now = new Date();
        document.getElementById('st-time').innerText = now.toLocaleTimeString('fi-FI');
    }

    init();
</script>
</body>
</html>
